[colors]
bg = #1f1f28
; bg = #000000
fg = #dcd7ba
muted = #727169
accent = #7e9cd8
urgent = #ff5555
focused_bg = #44475a

[bar/main]
bottom = true
width = 100%
height = 32
background = ${colors.bg}
foreground = ${colors.fg}

padding-left = 1
padding-right = 1
module-margin = 1

separator = "|"
separator-foreground = ${colors.muted}

font-0 = "monospace:pixelsize=14;2"
font-1 = "Noto Color Emoji:pixelsize=14;2"

; i3 integration
wm-restack = i3
enable-ipc = true

; Layout
modules-left = i3
modules-right = tray eth wlan fs_root memory volume xkb date

[settings]
screenchange-reload = true
pseudo-transparency = false

; -------------------------
; i3 Workspaces
; -------------------------
[module/i3]
type = internal/i3

pin-workspaces = true
index-sort = true
enable-click = true
enable-scroll = true

format = <label-state> <label-mode>

label-focused = %index%
label-focused-padding = 1
label-focused-background = ${colors.focused_bg}
label-focused-underline = ${colors.accent}

label-unfocused = %index%
label-unfocused-padding = 1

label-visible = %index%
label-visible-padding = 1

label-urgent = %index%
label-urgent-padding = 1
label-urgent-background = ${colors.urgent}
label-urgent-foreground = ${colors.bg}

label-separator = " "

label-mode = %mode%
label-mode-padding = 1
label-mode-foreground = ${colors.bg}
label-mode-background = ${colors.accent}

; Optional (uncomment if your workspaces are named like "1:web", "2:term", etc.)
; strip-wsnumbers = true
; fuzzy-match = true
; ws-icon-0 = 1:web;🌐
; ws-icon-1 = 2:term;
; ws-icon-2 = 3:files;
; ws-icon-default = 
; label-focused = %icon%
; label-unfocused = %icon%
; label-visible = %icon%
; label-urgent = %icon%

; -------------------------
; Network (Ethernet/WiFi) - show IP, "down" if none
; -------------------------
[network-base]
type = internal/network
interval = 3
unknown-as-up = true

format-connected = <label-connected>
format-disconnected = <label-disconnected>

; NOTE:
; interface-type auto-picks an interface. If it doesn’t select the right one,
; replace interface-type with a hardcoded interface name:
;   interface = enp0s31f6
;   interface = wlp2s0

[module/eth]
inherit = network-base
interface-type = wired
label-connected = ETH %local_ip%
label-disconnected = ETH down
label-disconnected-foreground = ${colors.muted}

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = WIFI %local_ip%
label-disconnected = WIFI down
label-disconnected-foreground = ${colors.muted}

; -------------------------
; Filesystem (/)
; -------------------------
[module/fs_root]
type = internal/fs
interval = 30
mount-0 = /
fixed-values = true

format-mounted = <label-mounted>
format-unmounted = <label-unmounted>

label-mounted = / %used% / %total%
label-unmounted = / unmounted
label-unmounted-foreground = ${colors.muted}

; -------------------------
; RAM (used / free)
; -------------------------
[module/memory]
type = internal/memory
interval = 2
format = <label>
label = RAM %used% / %total%
warn-percentage = 95

; -------------------------
; Volume
; -------------------------
[module/volume]
type = internal/pulseaudio
use-ui-max = false

format-volume = <label-volume>
label-volume = VOL %percentage%%

format-muted = <label-muted>
label-muted = VOL muted
label-muted-foreground = ${colors.muted}

; -------------------------
; Keyboard layout (flags)
; -------------------------
[module/xkb]
type = internal/xkeyboard
format = <label-layout>
label-layout = %icon%
label-layout-padding = 1
blacklist-0 = num lock
blacklist-1 = scroll lock
layout-icon-0 = us;US
layout-icon-1 = gr;GR

; -------------------------
; Date / Time
; -------------------------
[module/date]
type = internal/date
interval = 1
date = %Y-%m-%d
time = %H:%M:%S
label = %date% %time%

[module/tray]
type = internal/tray
tray-size = 90%      ; relative to bar height
tray-spacing = 6px
format-margin = 4px
